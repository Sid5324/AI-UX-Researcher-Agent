<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic Research AI - Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        
        h1 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            font-size: 16px;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        
        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            min-height: 120px;
            resize: vertical;
        }
        
        .button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 14px 32px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(102, 126, 234, 0.4);
        }
        
        .button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .goals-list {
            display: grid;
            gap: 20px;
        }
        
        .goal-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        
        .goal-card.completed {
            border-left-color: #10b981;
        }
        
        .goal-card.failed {
            border-left-color: #ef4444;
        }
        
        .goal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .goal-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .goal-status.pending { background: #fef3c7; color: #92400e; }
        .goal-status.running { background: #dbeafe; color: #1e40af; }
        .goal-status.completed { background: #d1fae5; color: #065f46; }
        .goal-status.failed { background: #fee2e2; color: #991b1b; }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin: 12px 0;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
        }
        
        .system-status {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .status-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        .status-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .status-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }
        
        .status-value {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 8px;
            margin-top: 12px;
        }
        
        .success {
            background: #d1fae5;
            color: #065f46;
            padding: 12px;
            border-radius: 8px;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🤖 Agentic Research AI</h1>
            <p class="subtitle">Autonomous AI agent for product research - Week 1 MVP</p>
        </div>
        
        <!-- System Status -->
        <div class="system-status">
            <div class="status-card">
                <div class="status-icon">🟢</div>
                <div class="status-label">System Status</div>
                <div class="status-value" id="systemStatus">Loading...</div>
            </div>
            <div class="status-card">
                <div class="status-icon">🤖</div>
                <div class="status-label">AI Provider</div>
                <div class="status-value" id="aiProvider">Loading...</div>
            </div>
            <div class="status-card">
                <div class="status-icon">🎯</div>
                <div class="status-label">Mode</div>
                <div class="status-value" id="mode">Loading...</div>
            </div>
            <div class="status-card">
                <div class="status-icon">📊</div>
                <div class="status-label">Total Goals</div>
                <div class="status-value" id="totalGoals">0</div>
            </div>
        </div>
        
        <!-- Create New Goal -->
        <div class="card">
            <h2>✨ Create New Research Goal</h2>
            <form id="createGoalForm">
                <div class="form-group">
                    <label for="goalDescription">Goal Description</label>
                    <textarea 
                        id="goalDescription" 
                        placeholder="Example: Fix our activation rate decline from 42% to 28%. Budget $2000, timeline 1 week."
                        required
                    ></textarea>
                </div>
                
                <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div>
                        <label for="budget">Budget (USD)</label>
                        <input type="number" id="budget" placeholder="2000" min="0" step="100">
                    </div>
                    <div>
                        <label for="timeline">Timeline (days)</label>
                        <input type="number" id="timeline" placeholder="7" min="1" max="30">
                    </div>
                </div>
                
                <button type="submit" class="button" id="createButton">
                    🚀 Start Autonomous Research
                </button>
                
                <div id="createMessage"></div>
            </form>
        </div>
        
        <!-- Active Goals -->
        <div class="card">
            <h2>📋 Recent Goals</h2>
            <div id="goalsList">
                <p style="color: #999; text-align: center; padding: 20px;">Loading goals...</p>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = 'http://localhost:8000';
        
        // Load system info
        async function loadSystemInfo() {
            try {
                const response = await fetch(`${API_BASE}/info`);
                const data = await response.json();
                
                document.getElementById('systemStatus').textContent = 'Healthy';
                document.getElementById('aiProvider').textContent = data.ai_models[0]?.provider || 'N/A';
                document.getElementById('mode').textContent = data.mode.toUpperCase();
            } catch (error) {
                document.getElementById('systemStatus').textContent = 'Offline';
                console.error('Failed to load system info:', error);
            }
        }
        
        // Load goals
        async function loadGoals() {
            try {
                const response = await fetch(`${API_BASE}/goals`);
                const goals = await response.json();
                
                document.getElementById('totalGoals').textContent = goals.length;
                
                const goalsList = document.getElementById('goalsList');
                
                if (goals.length === 0) {
                    goalsList.innerHTML = '<p style="color: #999; text-align: center; padding: 20px;">No goals yet. Create one above!</p>';
                    return;
                }
                
                goalsList.innerHTML = goals.map(goal => `
                    <div class="goal-card ${goal.status}">
                        <div class="goal-header">
                            <strong>${goal.description.substring(0, 100)}${goal.description.length > 100 ? '...' : ''}</strong>
                            <span class="goal-status ${goal.status}">${goal.status}</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${goal.progress_percent}%"></div>
                        </div>
                        <div style="font-size: 12px; color: #666; margin-top: 8px;">
                            Progress: ${goal.progress_percent.toFixed(1)}% | 
                            Mode: ${goal.mode} | 
                            Created: ${new Date(goal.created_at).toLocaleString()}
                            ${goal.current_agent ? ` | Agent: ${goal.current_agent}` : ''}
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Failed to load goals:', error);
            }
        }
        
        // Create goal
        document.getElementById('createGoalForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const button = document.getElementById('createButton');
            const messageDiv = document.getElementById('createMessage');
            
            button.disabled = true;
            button.innerHTML = '<span class="loading"></span> Creating goal...';
            messageDiv.innerHTML = '';
            
            try {
                const description = document.getElementById('goalDescription').value;
                const budget = document.getElementById('budget').value;
                const timeline = document.getElementById('timeline').value;
                
                const response = await fetch(`${API_BASE}/goals`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        description,
                        budget_usd: budget ? parseFloat(budget) : null,
                        timeline_days: timeline ? parseInt(timeline) : null,
                    }),
                });
                
                if (!response.ok) {
                    throw new Error('Failed to create goal');
                }
                
                const goal = await response.json();
                
                messageDiv.innerHTML = `
                    <div class="success">
                        ✅ Goal created successfully! The agent is now working autonomously.<br>
                        Goal ID: ${goal.id}
                    </div>
                `;
                
                // Clear form
                document.getElementById('goalDescription').value = '';
                document.getElementById('budget').value = '';
                document.getElementById('timeline').value = '';
                
                // Reload goals after 1 second
                setTimeout(loadGoals, 1000);
                
            } catch (error) {
                messageDiv.innerHTML = `
                    <div class="error">
                        ❌ Failed to create goal: ${error.message}<br>
                        Make sure the API server is running: uvicorn src.api.main:app --reload
                    </div>
                `;
            } finally {
                button.disabled = false;
                button.innerHTML = '🚀 Start Autonomous Research';
            }
        });
        
        // Initial load
        loadSystemInfo();
        loadGoals();
        
        // Auto-refresh goals every 5 seconds
        setInterval(loadGoals, 5000);
    </script>
</body>
</html>
