version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
      - /app/.venv # Exclude virtual environment
    environment:
      DEBUG: "True"
      HOT_RELOAD: "True"
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend-nextjs
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend-nextjs:/app
      - /app/node_modules
      - /app/.next
    environment:
      NODE_ENV: development
    command: npm run dev
